description: Publishes a local skill directory to the API hub catalog and the GCS
  bundle store. Runs the four-step author pipeline end to end, packing the source
  tree into a deterministic .skill zip, signing the manifest with an ed25519 private
  key, uploading the zip to GCS, and registering the signed manifest with API hub
  as an API plus Version plus Spec triple along with its four attribute values. Idempotent
  by design; re-running with identical inputs produces byte-identical output. Includes
  a bootstrap mode for first-time self-publication.
